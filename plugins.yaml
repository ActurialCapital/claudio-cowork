# ─────────────────────────────────────────────────────────────────
# claudio-cowork plugin registry
#
# Single source of truth for all plugins installed by `make plugins`.
# To add a plugin, append a new entry following the structure below.
# The Bash installer reads this file — no script changes needed.
#
# Fields:
#   name          Display name shown in the terminal
#   description   One-line purpose (shown during install)
#   requires      Command that must be on PATH (e.g. npx, claude)
#   check_file    If set, plugin is "installed" when this file exists
#                 relative to the project root
#   check_cmd     If set, plugin is "installed" when this command
#                 exits 0 and outputs a count > 0
#   install_cmd   Command to run for installation
#   install_dir   Where to cd before running install_cmd
#                 "project_root" = parent of claudio-cowork/
#                 (omit for commands that don't need a specific dir)
#   manual_hint   Fallback command shown when `requires` is missing
#   summary       Post-install description (what it adds)
#   next_step     Post-install guidance (how to use it)
# ─────────────────────────────────────────────────────────────────

plugins:
  - name: Get Shit Done (GSD)
    description: Project-level planning, task decomposition, parallel execution
    requires: npx
    check_file: .claude/gsd-manifest.json
    install_cmd: npx get-shit-done-cc@latest --claude --local
    install_dir: project_root
    manual_hint: cd <project-root> && npx get-shit-done-cc --claude --local
    summary: Project planning, wave-based parallel execution, cost tracking. Adds /gsd commands to Claude Code.
    next_step: Use /gsd commands for project orchestration

  - name: Superpowers
    description: TDD enforcement, structured planning, dual-stage code review
    requires: claude
    check_cmd: claude plugin list 2>/dev/null | grep -c superpowers
    install_cmd: claude plugin install superpowers@superpowers-marketplace
    manual_hint: claude plugin install superpowers@superpowers-marketplace
    summary: TDD, structured planning, dual-stage code review. Activates automatically by context.
    next_step: Superpowers skills activate automatically by context
